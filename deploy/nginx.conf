# /etc/nginx/sites-available/md.mcnu.ro
server {
    listen 80;
    listen [::]:80;
    server_name md.mcnu.ro;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name md.mcnu.ro;

    ssl_certificate     /etc/letsencrypt/live/md.mcnu.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/md.mcnu.ro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Uploads up to 25 MB (app limit); leave nginx a little headroom.
    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;       # stream large uploads to the app
        proxy_read_timeout 120s;           # markitdown can be slow on big PDFs
    }
}
